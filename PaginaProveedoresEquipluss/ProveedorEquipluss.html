<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiPluss | Catálogo Oficial Somos51</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="proveedorequiplus.css">

    <script src="../"></script>
    <script src="../PaginaProveedores/proveedorhoneywhale.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-box">
            <a href="../index.html"><img src="../imagenes-somos51/147097a2-4bf4-41a5-8a3d-9f557a1f6e29.png" alt="Somos51 Logo"></a>
            <div class="slogan-box">
                <h2>SOMOS51.com</h2>
                <span>Unidos por tu bienestar</span>
            </div>
        </div>
        <div class="user-access">
            <div style="text-align: right;">
                <span style="display:block; font-size: 0.7rem; color: #888;">Sección 51</span>
                Portal de Convenios
            </div>
            <i class="fas fa-file-signature"></i>
        </div>
    </header>

   <section class="brand-hero">

        <img src="../imagenes-catalogo-equipluss/fondo_equipluss.png" class="hero-bg-layer" alt="Fondo Equipluss">

        <div class="hero-brand-block">
            <img src="../imagenes proveedores/Equipluss_logo.png" class="hero-brand-logo" alt="Equipluss Logo">

            <div class="catalog-badge-box">
                <h1>CATÁLOGO</h1>
            </div>
    
            <span class="catalog-year-text">2025 - 2026</span>
    
            <button class="btn-catalog-visit" onclick="">Revisar Productos</button>
        </div>

        <div class="hero-display-block">
            <div class="blue-capsule-bg"></div>
            
            <div class="crossfade-slider">
                <div class="slide active">
                    <div class="model-badge-container" style="text-align: center; width: 100%;">
                        <span class="slide-badge-text" style="font-size: 4rem;">MUY PRONTO</span>
                        <span class="script-font" style="font-size: 2rem; color: #fff;">nuevos convenios</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="catalog-container">
        <div id="grid-productos-proveedor"></div>
    </main>

</body>
</html>
